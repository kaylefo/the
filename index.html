<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyper-Realistic Tomato Squashing Physics</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="hud">
    <h1>Tomato Squash Lab</h1>
    <p class="subtitle">Soft-body physics · rupture · juice dynamics</p>
    <div class="stats">
      <span id="stat-strain">Strain: 0%</span>
      <span id="stat-juice">Juice: 0 ml</span>
      <span id="stat-fps">FPS: —</span>
    </div>
    <div class="controls">
      <p><kbd>Click + drag</kbd> squash the tomato</p>
      <p><kbd>Scroll</kbd> adjust squeeze force</p>
      <p><kbd>R</kbd> reset · <kbd>Space</kbd> drop from height</p>
    </div>
    <div class="force-meter">
      <label for="force-slider">Squeeze force</label>
      <input id="force-slider" type="range" min="0.3" max="3" step="0.05" value="1.2" />
    </div>
    <button id="reset-btn" type="button">Reset Tomato</button>
  </div>

  <div id="loading">Simulating pulp viscosity…</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
